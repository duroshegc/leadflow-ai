<html lang="en">

        .feature p {

        }

            margin-bottom: 20px;
        }

        }
        
        .btn {

            color: #667eea;
            padding: 15px 40px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1em;
        }
        
        .btn:hover {

        }

            color: #667eea;
        }

            gap: 30px;
        }

            list-style: none;
            padding-left: 25px;
            position: relative;
        }
